name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read release.build.json
        id: meta
        run: |
          echo "version_name=$(python3 -c "import json; print(json.load(open('release.build.json'))['version']['name'])")" >> "$GITHUB_OUTPUT"
          echo "version_code=$(python3 -c "import json; print(json.load(open('release.build.json'))['version']['code'])")" >> "$GITHUB_OUTPUT"

      - name: Build release
        run: chmod +x scripts/build_release.sh && ./scripts/build_release.sh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: orbit-notes-${{ steps.meta.outputs.version_name }}-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: orbit-notes-${{ steps.meta.outputs.version_name }}-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
